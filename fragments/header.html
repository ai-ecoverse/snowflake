<style>
  /* ── Site header ───────────────────────────────────── */
  .site-header { background: var(--color-surface-dark); color: var(--color-fg-on-dark); position: sticky; top: 0; z-index: 100; }
  .site-header-inner { display: flex; align-items: center; height: 64px; padding-inline: var(--spacing-md); gap: var(--spacing-lg); }
  .site-logo { color: var(--color-accent); font-weight: 700; font-size: 18px; letter-spacing: 0.04em; font-family: var(--heading-font-family); flex-shrink: 0; }
  .site-nav { display: flex; gap: var(--spacing-md); flex: 1; }
  .site-nav a { color: var(--color-fg-on-dark); font-weight: 700; font-size: var(--body-sm); padding: 22px 0; display: inline-flex; align-items: center; gap: 4px; border-bottom: 2px solid transparent; transition: border-color 150ms ease-out; }
  .site-nav a:hover, .site-nav a:focus-visible { border-bottom-color: var(--color-accent); outline: none; }
  .site-nav .caret { width: 8px; height: 8px; border-right: 1px solid currentColor; border-bottom: 1px solid currentColor; transform: rotate(45deg) translateY(-2px); opacity: 0.7; }
  .site-utility { display: flex; gap: 4px; align-items: center; }
  .icon-btn { background: transparent; color: var(--color-fg-on-dark); border: none; padding: 12px; min-width: 44px; min-height: 44px; font-size: var(--body-sm); font-weight: 400; border-radius: var(--radius); display: inline-flex; align-items: center; justify-content: center; }
  .icon-btn:hover { color: var(--color-accent); }
  .icon-btn:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; }
  .icon-btn .ic { font-size: 18px; line-height: 1; }
  .locale-tag { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; }
  /* Geo banner */
  .geo-banner { background: var(--color-surface-dark-alt); color: var(--color-fg-on-dark); padding: 12px var(--spacing-md); display: flex; align-items: center; justify-content: center; gap: var(--spacing-md); font-size: var(--body-sm); border-top: 1px solid var(--color-border-dark); }
  .geo-banner-text { color: var(--color-fg-on-dark-muted); }
  .geo-banner-cta { color: var(--color-accent); font-weight: 700; }
  .geo-banner-cta:hover { text-decoration: underline; }
  .geo-banner-dismiss { margin-left: auto; background: transparent; color: var(--color-fg-on-dark-muted); border: none; padding: 4px 8px; font-size: 18px; line-height: 1; }
  .geo-banner-dismiss:hover { color: var(--color-fg-on-dark); }
  /* Skip link */
  .skip-link { position: absolute; top: 0; left: 0; background: var(--color-accent); color: var(--color-fg); padding: 12px 18px; font-family: var(--heading-font-family); font-weight: 700; font-size: 14px; text-decoration: none; z-index: 1000; transform: translateY(-100%); transition: transform 150ms ease-out; }
  .skip-link:focus-visible { transform: translateY(0); outline: 2px solid var(--color-fg); outline-offset: -2px; }
  @media (max-width: 639px) {
    .site-nav { display: none; }
    .site-utility .icon-btn:not(.menu-toggle) { display: none; }
    .geo-banner { flex-wrap: wrap; padding: 8px var(--spacing-sm); font-size: 12px; }
  }
</style>
